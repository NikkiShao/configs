# Rebinding command activation
unbind C-b
set -g prefix M-a
bind M-a send-prefix

# Rebinding new window
unbind n
bind n new-window

# Number windows and panes from 1
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on

# Previous/next window (triggered via Ghostty's Cmd+, / Cmd+.)
bind , previous-window
bind . next-window

# Window navigation with Ctrl+number
bind -n C-1 select-window -t 1
bind -n C-2 select-window -t 2
bind -n C-3 select-window -t 3
bind -n C-4 select-window -t 4
bind -n C-5 select-window -t 5
bind -n C-6 select-window -t 6
bind -n C-7 select-window -t 7
bind -n C-8 select-window -t 8
bind -n C-9 select-window -t 9
bind -n C-0 select-window -t 10

# Rebinding pane navigation (prefix-based)
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# Ctrl-arrows pane navigation (Neovim-aware via vim-tmux-navigator)
is_vim="ps -o state= -o comm= -t '#{pane_tty}' \
    | grep -iqE '^[^TXZ ]+ +(\\S+\\/)?g?(view|l?n?vim?x?|fzf)(diff)?$'"
bind-key -n C-Left  if-shell "$is_vim" "send-keys C-Left"  "select-pane -L"
bind-key -n C-Down  if-shell "$is_vim" "send-keys C-Down"  "select-pane -D"
bind-key -n C-Up    if-shell "$is_vim" "send-keys C-Up"    "select-pane -U"
bind-key -n C-Right if-shell "$is_vim" "send-keys C-Right" "select-pane -R"

# Mouse navigation
set -g mouse on

# Mouse drag: copy and clear selection on release
bind-key -T copy-mode-vi MouseDragEnd1Pane send-keys -X copy-selection-and-cancel
bind-key -T copy-mode    MouseDragEnd1Pane send-keys -X copy-selection-and-cancel

# Window splits
bind v split-window -h -c '#{pane_current_path}'
bind s split-window -v -c '#{pane_current_path}'

unbind &
bind X confirm-before -p "kill window '#W'? (y/n)" kill-window
# Override default kill-pane confirmation - close pane immediately (triggered via Cmd+Shift+W)
bind x kill-pane

bind m command-prompt -I "#W" "rename-window '%%'"
set-option -g automatic-rename on
set -g automatic-rename-format "#{pane_current_command}"

# Open new things in the current pane's directory
bind c new-window -c '#{pane_current_path}'
bind '"' split-window -v -c '#{pane_current_path}'
bind % split-window -h -c '#{pane_current_path}'

# Tree
bind t choose-tree -Z

# Persistent scratch popup (survives across windows)
bind p if-shell -F '#{==:#{session_name},scratch}' { detach-client } { display-popup -d "#{pane_current_path}" -w 80% -h 80% -E "tmux new-session -A -s scratch" }

# Persistent scratch popup (survives across windows)
bind u if-shell -F '#{==:#{session_name},notes}' { detach-client } { display-popup -d "#{pane_current_path}" -w 80% -h 80% -E "tmux new-session -A -s notes" }

# Popups
bind e display-popup -E -w 80% -h 80% 'nvim ~/.tmux.conf'
bind y display-popup -E -w 80% -h 80% 'nvim ~/.zshrc'
bind g display-popup -E -w 90% -h 90% 'git log --oneline --graph --decorate --all'

# Reload 
bind r source-file ~/.config/tmux/tmux.conf \; display "Reloaded!"

# List of plugins
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
# catppuccin is loaded manually below (not via TPM) so status variables are available synchronously

# Terminal colors
set -g default-terminal "tmux-256color"
set -as terminal-overrides ',*:RGB'
set -as terminal-overrides ',*:Smulx=\E[4::%p1%dm'  # undercurl support
set -as terminal-overrides ',*:Setulc=\E[58::2::::%p1%{65536}%/%d::%p1%{256}%/%{255}%&%d::%p1%{255}%&%d%;m'  # underscore colours - needs tmux-3.0

# Configure Tmux
set -g escape-time 0
set -g focus-events on
set -g history-limit 50000
set -g status-position top
set -g status-style "bg=default"

# Catppuccin options (must be set BEFORE sourcing the theme)
set -g @catppuccin_flavor 'frappe'
set -g @catppuccin_status_background "none"
set -g @catppuccin_pane_status_enabled "yes"
set -g @catppuccin_pane_border_status "top"
set -g @catppuccin_directory_color "#{@thm_mauve}"
# Tab style: rounded pill on the number only, plain text after (set via window-status-format below)
set -g @catppuccin_window_status_style "none"

# Rounded status line separators (right side modules)
set -g @catppuccin_status_left_separator ""
set -g @catppuccin_status_middle_separator ""
set -g @catppuccin_status_right_separator ""
# Disconnect modules so each one gets its own bg=default reset (round caps actually render)
set -g @catppuccin_status_connect_separator "no"
# Two-tone module pills: bright icon segment + visible grey text segment (matches active tab)
set -g @catppuccin_status_module_text_bg "#{@thm_surface_2}"
set -g @catppuccin_status_module_text_fg "#{@thm_fg}"

# Load catppuccin (source is synchronous, so status variables are available immediately)
source ~/.config/tmux/plugins/catppuccin/tmux/catppuccin_options_tmux.conf
source ~/.config/tmux/plugins/catppuccin/tmux/catppuccin_tmux.conf

# Window tab format: rounded coloured pill around the number only, plain text after
set -g window-status-format " #[fg=#{@thm_surface_1},bg=default]#[bg=#{@thm_surface_1},fg=#{@thm_subtext_0}] #I #[bg=#{@thm_mantle},fg=#{@thm_overlay_0}] #W #[fg=#{@thm_mantle},bg=default]"
set -g window-status-current-format " #[fg=#{@thm_mauve},bg=default]#[bg=#{@thm_mauve},fg=#{@thm_crust},bold] #I #[nobold,bg=#{@thm_surface_2},fg=#{@thm_fg}] #W #[fg=#{@thm_surface_2},bg=default]"
set -g window-status-separator ""

# One blank row below the bar for breathing room (smallest tmux can do)
set -g status 2
set -g status-format[1] ""


# Brighter selection highlight in copy-mode (must be AFTER catppuccin which also sets mode-style)
set -g mode-style "bg=#264f78,fg=#cdd6f4"

# Pane visibility - darken inactive panes, heavy border (must be AFTER catppuccin)
set -g window-style 'bg=#292c3c'
set -g window-active-style 'bg=#303446'
set -g pane-border-lines heavy
set -g pane-border-style 'bg=#292c3c,fg=#414559'
set -g pane-active-border-style 'bg=#303446,fg=#8caaee'

# Make the status line pretty and add some modules
set -g status-right-length 100
set -g status-left-length 100
set -g status-left ""
set -g status-right "#{E:@catppuccin_status_directory}"
set -ag status-right "#[bg=default]  "
set -ag status-right "#{E:@catppuccin_status_application}"
set -ag status-right "#[bg=default]  "
set -ag status-right "#{E:@catppuccin_status_session}"
set -ag status-right "#[bg=default]  "
set -ag status-right "#{E:@catppuccin_status_uptime}"

# Ensure Homebrew bin is in PATH for TPM scripts
set-environment -g PATH "/opt/homebrew/bin:/usr/local/bin:/usr/bin:/bin:/usr/sbin:/sbin"

# Initialize TMUX plugin manager (keep this line at the very bottom of tmux.conf)
run '~/.tmux/plugins/tpm/tpm'

